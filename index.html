<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기자 취재 동향 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --surface3: #232840;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.15);
    --green: #2ecc8f;
    --amber: #f5a623;
    --red: #e85d5d;
    --text: #e2e8f0;
    --text-muted: #7a869a;
    --border: rgba(255,255,255,0.07);
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* Setup Screen */
  #setup-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
  }

  .setup-card h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--accent);
  }

  .setup-card p {
    color: var(--text-muted);
    margin-bottom: 28px;
    font-size: 13px;
    line-height: 1.6;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 12px;
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .btn-primary:hover { opacity: 0.85; }

  .setup-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* Main Dashboard */
  #dashboard {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }


  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .filter-group {
    display: flex;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .filter-btn {
    background: none;
    border: none;
    border-radius: 6px;
    padding: 5px 12px;
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .btn-settings {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
    flex: 1;
    transition: grid-template-columns 0.25s ease;
  }

  .main.detail-open {
    grid-template-columns: 1fr 400px;
  }

  .content {
    padding: 20px 24px;
    overflow-y: auto;
  }

  .main.detail-open .content {
    border-right: 1px solid var(--border);
  }

  .sidebar {
    padding: 20px 16px;
    overflow-y: auto;
    max-height: calc(100vh - 60px);
    position: sticky;
    top: 60px;
    display: none;
  }

  .main.detail-open .sidebar {
    display: block;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
  }

  .stat-delta {
    font-size: 11px;
    margin-top: 4px;
    font-weight: 500;
  }

  .delta-up { color: var(--green); }
  .delta-down { color: var(--red); }
  .delta-neutral { color: var(--text-muted); }

  /* Section titles */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .chart-card canvas {
    max-height: 200px;
  }

  /* Ranking table */
  .ranking-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .ranking-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .ranking-table {
    width: 100%;
    border-collapse: collapse;
  }

  .ranking-table th {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    padding: 0 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .ranking-table th:last-child { text-align: right; }

  .ranking-table td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .ranking-table tr:last-child td { border-bottom: none; }

  .ranking-table tr.journalist-row {
    cursor: pointer;
    transition: background 0.15s;
  }

  .ranking-table tr.journalist-row:hover {
    background: var(--accent-dim);
  }

  .rank-num {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-muted);
    width: 28px;
  }

  .rank-num.top3 { color: var(--amber); font-weight: 700; }

  .journalist-name {
    font-weight: 600;
    font-size: 14px;
  }

  .journalist-outlet {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .bar-cell {
    width: 120px;
  }

  .bar-bg {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .bar-fill {
    background: var(--accent);
    border-radius: 4px;
    height: 100%;
    transition: width 0.4s ease;
  }

  .count-cell {
    text-align: right;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }

  .delta-cell {
    text-align: right;
    font-size: 12px;
    font-weight: 500;
    width: 60px;
  }

  /* Analysis */
  .analysis-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .analysis-summary {
    font-size: 12px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .analysis-block {
    margin-bottom: 12px;
  }

  .analysis-block-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .category-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
  }

  .category-name {
    flex: 1;
    color: var(--text);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .category-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  .category-pct {
    font-size: 10px;
    color: var(--text-muted);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  .pattern-item {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text);
  }

  .pattern-dot {
    color: var(--amber);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* Detail Panel */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
    display: none;
  }

  .detail-panel.visible { display: block; }

  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .detail-name {
    font-size: 16px;
    font-weight: 700;
  }

  .detail-outlet {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .btn-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 2px;
  }

  .detail-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .detail-stat {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }

  .detail-stat-val {
    font-size: 20px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--accent);
  }

  .detail-stat-lbl {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .detail-section-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
  }

  .detail-section-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .detail-section-name {
    width: 80px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .detail-section-bar-bg {
    flex: 1;
    background: var(--surface3);
    border-radius: 3px;
    height: 5px;
    overflow: hidden;
  }

  .detail-section-bar-fill {
    background: var(--accent);
    border-radius: 3px;
    height: 100%;
  }

  .detail-section-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    width: 24px;
    text-align: right;
  }

  .detail-chart-wrap canvas { max-height: 100px; }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    flex-direction: column;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--surface3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--text-muted);
    font-size: 13px;
  }

  /* Skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>기자 취재 동향 대시보드</h1>
    <p>Supabase 연결 정보를 입력하세요. 이 값은 브라우저 로컬스토리지에 저장됩니다.</p>
    <div class="field">
      <label>Supabase URL</label>
      <input type="text" id="input-url" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="field">
      <label>Supabase Anon / Publishable Key</label>
      <input type="text" id="input-key" placeholder="eyJ... 또는 sb_publishable_...">
    </div>
    <button class="btn-primary" onclick="handleSetup()">연결 확인 후 시작</button>
    <div class="setup-error" id="setup-error"></div>
  </div>
</div>

<!-- Main Dashboard -->
<div id="dashboard">
  <header class="header">
    <div class="header-left">
      <span class="header-logo">기자 취재 동향</span>
    </div>
    <div class="header-right">
      <div class="filter-group">
        <button class="filter-btn" data-days="1" onclick="setFilter(1)">1일</button>
        <button class="filter-btn active" data-days="7" onclick="setFilter(7)">7일</button>
        <button class="filter-btn" data-days="30" onclick="setFilter(30)">30일</button>
        <button class="filter-btn" data-days="90" onclick="setFilter(90)">90일</button>
      </div>
      <button class="btn-settings" onclick="resetSettings()">설정 초기화</button>
    </div>
  </header>

  <div class="main">
    <!-- Content -->
    <div class="content">
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">기간 내 기사</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-delta" id="stat-total-delta"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">활동 기자</div>
          <div class="stat-value" id="stat-active">—</div>
          <div class="stat-delta" id="stat-active-delta"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">일평균 기사</div>
          <div class="stat-value" id="stat-daily-avg">—</div>
          <div class="stat-delta delta-neutral" id="stat-avg-delta"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">주요 섹션</div>
          <div class="stat-value" id="stat-top-section" style="font-size:16px;margin-top:4px;">—</div>
          <div class="stat-delta delta-neutral" id="stat-section-count"></div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="section-title">시간대별 발행 패턴</div>
          <canvas id="chart-hourly"></canvas>
        </div>
        <div class="chart-card">
          <div class="section-title">섹션별 분포</div>
          <canvas id="chart-section"></canvas>
        </div>
      </div>

      <!-- Ranking -->
      <div class="ranking-card">
        <div class="ranking-header">
          <div class="section-title" style="margin-bottom:0">기자별 기사량 랭킹</div>
          <div id="ranking-date-range" style="font-size:11px;color:var(--text-muted);font-family:var(--mono)">—</div>
        </div>
        <table class="ranking-table">
          <thead>
            <tr>
              <th style="width:32px">#</th>
              <th>기자</th>
              <th class="bar-cell">비율</th>
              <th style="text-align:right">기사</th>
              <th style="text-align:right;white-space:nowrap">주간 증감</th>
            </tr>
          </thead>
          <tbody id="ranking-body">
            <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">데이터 로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Detail Panel -->
      <div class="detail-panel" id="detail-panel">
        <div class="detail-header">
          <div>
            <div class="detail-name" id="detail-name">—</div>
            <div class="detail-outlet" id="detail-outlet">—</div>
          </div>
          <button class="btn-close" onclick="closeDetail()">×</button>
        </div>
        <div class="detail-stats">
          <div class="detail-stat">
            <div class="detail-stat-val" id="detail-total">—</div>
            <div class="detail-stat-lbl">기간 내 기사</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val" id="detail-weekly-delta">—</div>
            <div class="detail-stat-lbl">주간 증감</div>
          </div>
        </div>
        <div class="section-title">섹션 분포</div>
        <div class="detail-section-list" id="detail-section-list"></div>
        <div class="section-title" style="margin-top:10px">시간대 패턴</div>
        <div class="detail-chart-wrap">
          <canvas id="detail-chart-hourly"></canvas>
        </div>
      </div>

      <!-- Analysis Card -->
      <div class="analysis-card" id="analysis-card" style="display:none">
        <div class="section-title" style="margin-bottom:10px">취재 동향 분석</div>
        <div class="analysis-summary" id="analysis-summary"></div>
        <div class="analysis-block">
          <div class="analysis-block-title">주요 취재 분야</div>
          <div id="analysis-categories"></div>
        </div>
        <div class="analysis-block" id="analysis-patterns-block" style="display:none">
          <div class="analysis-block-title">눈에 띄는 패턴</div>
          <div id="analysis-patterns"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const CONFIG = {
  TABLE_ARTICLES: 'articles',
  TABLE_JOURNALISTS: 'journalists',
  COL_JOURNALIST_ID: 'journalist_id',
  COL_REPORTER_NAME: 'reporter_name',
  COL_TITLE: 'title',
  COL_PUBLISHED_AT: 'published_at',
  COL_SECTION: 'section',
  COL_OUTLET: 'outlet',
};

const state = {
  supabase: null,
  filterDays: 7,
  articles: [],
  journalists: {},
  charts: { hourly: null, section: null, detailHourly: null },
  selectedJournalist: null,
};

// ── Utilities ──────────────────────────────────────────────────────────────

function getDateFrom(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString();
}


function showToast(msg, duration = 4000) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

function deltaText(val) {
  if (val > 0) return `<span class="delta-up">▲ ${val}</span>`;
  if (val < 0) return `<span class="delta-down">▼ ${Math.abs(val)}</span>`;
  return `<span class="delta-neutral">— 동일</span>`;
}

// ── Setup ──────────────────────────────────────────────────────────────────

async function handleSetup() {
  const url = document.getElementById('input-url').value.trim();
  const key = document.getElementById('input-key').value.trim();
  const errEl = document.getElementById('setup-error');
  errEl.style.display = 'none';

  if (!url || !key) {
    errEl.textContent = 'URL과 Key를 모두 입력해주세요.';
    errEl.style.display = 'block';
    return;
  }

  try {
    const client = window.supabase.createClient(url, key);
    const { error } = await client.from(CONFIG.TABLE_ARTICLES).select('id').limit(1);
    if (error) throw new Error(error.message);

    localStorage.setItem('sb_url', url);
    localStorage.setItem('sb_key', key);
    await initDashboard(url, key);
  } catch (e) {
    errEl.textContent = `연결 실패: ${e.message}`;
    errEl.style.display = 'block';
  }
}

function resetSettings() {
  localStorage.removeItem('sb_url');
  localStorage.removeItem('sb_key');
  location.reload();
}

// ── Init ───────────────────────────────────────────────────────────────────

async function initDashboard(url, key) {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';

  state.supabase = window.supabase.createClient(url, key);

  await Promise.all([
    loadJournalists(),
    loadAndRender(),
  ]);

}

async function loadJournalists() {
  const { data } = await state.supabase
    .from(CONFIG.TABLE_JOURNALISTS)
    .select('id, name, outlet');

  if (data) {
    data.forEach(j => { state.journalists[j.id] = j; });
  }
}

// ── Data Loading ───────────────────────────────────────────────────────────

let _loadGeneration = 0;

async function fetchAllArticles(from) {
  const PAGE = 1000;
  let all = [];
  let offset = 0;

  while (true) {
    const { data, error } = await state.supabase
      .from(CONFIG.TABLE_ARTICLES)
      .select(`${CONFIG.COL_JOURNALIST_ID}, ${CONFIG.COL_REPORTER_NAME}, ${CONFIG.COL_TITLE}, ${CONFIG.COL_PUBLISHED_AT}, ${CONFIG.COL_SECTION}, ${CONFIG.COL_OUTLET}`)
      .gte(CONFIG.COL_PUBLISHED_AT, from)
      .order(CONFIG.COL_PUBLISHED_AT, { ascending: false })
      .range(offset, offset + PAGE - 1);

    if (error) {
      console.error('articles fetch error:', error);
      break;
    }

    all = all.concat(data || []);

    if (!data || data.length < PAGE) break;
    offset += PAGE;
  }

  return all;
}

async function loadAndRender() {
  const gen = ++_loadGeneration;
  const from = getDateFrom(state.filterDays);
  const articles = await fetchAllArticles(from);
  if (gen !== _loadGeneration) return;
  state.articles = articles;
  renderAll();
}

// ── Render ─────────────────────────────────────────────────────────────────

function renderAll() {
  renderStats();
  renderHourlyChart();
  renderSectionChart();
  renderRanking();
  if (state.selectedJournalist) openDetail(state.selectedJournalist);
}

function formatDate(d) {
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
}

function renderStats() {
  const total = state.articles.length;
  const isTruncated = total % 1000 === 0 && total >= 1000;
  const activeJournalists = new Set(state.articles.map(a => a[CONFIG.COL_JOURNALIST_ID])).size;
  const dailyAvg = (total / state.filterDays).toFixed(1);

  const toDate = new Date();
  const fromDate = new Date();
  fromDate.setDate(fromDate.getDate() - state.filterDays);
  const dateRange = `${formatDate(fromDate)} ~ ${formatDate(toDate)}`;

  // section count
  const sectionCounts = {};
  state.articles.forEach(a => {
    const s = a[CONFIG.COL_SECTION] || '미분류';
    sectionCounts[s] = (sectionCounts[s] || 0) + 1;
  });
  const topSection = Object.entries(sectionCounts).sort((a, b) => b[1] - a[1])[0];

  document.getElementById('stat-total').textContent = total.toLocaleString() + (isTruncated ? '+' : '');
  document.getElementById('stat-total-delta').textContent = dateRange;
  document.getElementById('stat-total-delta').className = 'stat-delta delta-neutral';
  document.getElementById('stat-active').textContent = activeJournalists;
  document.getElementById('stat-daily-avg').textContent = dailyAvg;
  document.getElementById('stat-avg-delta').textContent = dateRange;
  document.getElementById('stat-top-section').textContent = topSection ? topSection[0] : '—';
  document.getElementById('stat-section-count').textContent = topSection ? `${topSection[1]}건` : '';
}

function renderHourlyChart() {
  const hours = Array(24).fill(0);
  state.articles.forEach(a => {
    const h = new Date(a[CONFIG.COL_PUBLISHED_AT]).getHours();
    hours[h]++;
  });

  const ctx = document.getElementById('chart-hourly').getContext('2d');
  if (state.charts.hourly) state.charts.hourly.destroy();

  state.charts.hourly = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: hours.map((_, i) => `${i}시`),
      datasets: [{
        data: hours,
        backgroundColor: hours.map(v => {
          const max = Math.max(...hours);
          const alpha = max > 0 ? 0.3 + 0.7 * (v / max) : 0.3;
          return `rgba(79,142,247,${alpha})`;
        }),
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7a869a', font: { size: 9 }, maxTicksLimit: 8 }, grid: { display: false } },
        y: { ticks: { color: '#7a869a', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function renderSectionChart() {
  const counts = {};
  state.articles.forEach(a => {
    const s = a[CONFIG.COL_SECTION] || '미분류';
    counts[s] = (counts[s] || 0) + 1;
  });

  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const colors = ['#4f8ef7', '#2ecc8f', '#f5a623', '#e85d5d', '#a78bfa', '#fb923c', '#34d399'];

  const ctx = document.getElementById('chart-section').getContext('2d');
  if (state.charts.section) state.charts.section.destroy();

  state.charts.section = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sorted.map(([k]) => k),
      datasets: [{
        data: sorted.map(([, v]) => v),
        backgroundColor: colors.slice(0, sorted.length),
        borderWidth: 0,
        hoverOffset: 6,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#e2e8f0', font: { size: 11, family: "'Noto Sans KR'" }, padding: 8, boxWidth: 10 }
        }
      },
      cutout: '60%',
    }
  });
}

function renderRanking() {
  // 기간 날짜 범위 표시
  const toDate = new Date();
  const fromDate = new Date();
  fromDate.setDate(fromDate.getDate() - state.filterDays);
  document.getElementById('ranking-date-range').textContent = `${formatDate(fromDate)} ~ ${formatDate(toDate)}`;

  // 기간 내 기사 집계
  const countMap = {};
  state.articles.forEach(a => {
    const jid = a[CONFIG.COL_JOURNALIST_ID];
    if (!countMap[jid]) countMap[jid] = { count: 0, name: a[CONFIG.COL_REPORTER_NAME], outlet: a[CONFIG.COL_OUTLET] };
    countMap[jid].count++;
  });

  // 이전 기간 (주간 증감용)
  const prevFrom = getDateFrom(state.filterDays * 2);
  const prevTo = getDateFrom(state.filterDays);

  // 전주 데이터 조회 (비동기이지만 랭킹 먼저 렌더)
  const rankingGen = _loadGeneration;
  renderRankingTable(countMap, {});

  state.supabase
    .from(CONFIG.TABLE_ARTICLES)
    .select(`${CONFIG.COL_JOURNALIST_ID}`)
    .gte(CONFIG.COL_PUBLISHED_AT, prevFrom)
    .lt(CONFIG.COL_PUBLISHED_AT, prevTo)
    .then(({ data }) => {
      if (rankingGen !== _loadGeneration) return;
      const prevMap = {};
      (data || []).forEach(a => {
        prevMap[a[CONFIG.COL_JOURNALIST_ID]] = (prevMap[a[CONFIG.COL_JOURNALIST_ID]] || 0) + 1;
      });
      renderRankingTable(countMap, prevMap);
    });
}

function renderRankingTable(countMap, prevMap) {
  const sorted = Object.entries(countMap).sort((a, b) => b[1].count - a[1].count);
  const maxCount = sorted[0]?.[1]?.count || 1;
  const tbody = document.getElementById('ranking-body');
  const totalArticles = state.articles.length;
  const isTruncated = totalArticles % 1000 === 0 && totalArticles >= 1000;

  tbody.innerHTML = sorted.map(([jid, info], i) => {
    const rank = i + 1;
    const pct = Math.round((info.count / maxCount) * 100);
    const journalist = state.journalists[jid];
    const name = journalist?.name || info.name || '알 수 없음';
    const outlet = journalist?.outlet || info.outlet || '';
    const prevCount = prevMap[jid] || 0;
    const delta = info.count - prevCount;
    const countDisplay = isTruncated ? `${info.count}+` : info.count;

    return `<tr class="journalist-row" onclick="openDetail('${jid}')">
      <td class="rank-num ${rank <= 3 ? 'top3' : ''}">${rank}</td>
      <td>
        <div class="journalist-name">${name}</div>
        <div class="journalist-outlet">${outlet}</div>
      </td>
      <td class="bar-cell">
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      </td>
      <td class="count-cell">${countDisplay}</td>
      <td class="delta-cell">${deltaText(delta)}</td>
    </tr>`;
  }).join('');

  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">기간 내 데이터 없음</td></tr>';
  }
}

// ── Detail Panel ───────────────────────────────────────────────────────────

async function openDetail(journalistId) {
  state.selectedJournalist = journalistId;
  const journalist = state.journalists[journalistId];
  const articles = state.articles.filter(a => a[CONFIG.COL_JOURNALIST_ID] === journalistId);

  const name = journalist?.name || '알 수 없음';
  const outlet = journalist?.outlet || '';

  document.getElementById('detail-name').textContent = name;
  document.getElementById('detail-outlet').textContent = outlet;
  document.getElementById('detail-total').textContent = articles.length;

  // 주간 증감
  const thisWeekFrom = getDateFrom(7);
  const lastWeekFrom = getDateFrom(14);
  const thisWeek = state.articles.filter(a =>
    a[CONFIG.COL_JOURNALIST_ID] === journalistId &&
    new Date(a[CONFIG.COL_PUBLISHED_AT]) >= new Date(thisWeekFrom)
  ).length;

  const { data: prevData } = await state.supabase
    .from(CONFIG.TABLE_ARTICLES)
    .select('id')
    .eq(CONFIG.COL_JOURNALIST_ID, journalistId)
    .gte(CONFIG.COL_PUBLISHED_AT, lastWeekFrom)
    .lt(CONFIG.COL_PUBLISHED_AT, thisWeekFrom);

  const lastWeek = prevData?.length || 0;
  const delta = thisWeek - lastWeek;
  document.getElementById('detail-weekly-delta').innerHTML = delta > 0 ? `+${delta}` : `${delta}`;
  document.getElementById('detail-weekly-delta').style.color = delta > 0 ? 'var(--green)' : delta < 0 ? 'var(--red)' : 'var(--text-muted)';

  // 섹션 분포
  const sectionMap = {};
  articles.forEach(a => {
    const s = a[CONFIG.COL_SECTION] || '미분류';
    sectionMap[s] = (sectionMap[s] || 0) + 1;
  });
  const sortedSections = Object.entries(sectionMap).sort((a, b) => b[1] - a[1]);
  const maxSec = sortedSections[0]?.[1] || 1;

  document.getElementById('detail-section-list').innerHTML = sortedSections.map(([sec, cnt]) => `
    <div class="detail-section-row">
      <span class="detail-section-name">${sec}</span>
      <div class="detail-section-bar-bg">
        <div class="detail-section-bar-fill" style="width:${Math.round(cnt/maxSec*100)}%"></div>
      </div>
      <span class="detail-section-count">${cnt}</span>
    </div>
  `).join('');

  // 시간대 차트
  const hours = Array(24).fill(0);
  articles.forEach(a => {
    hours[new Date(a[CONFIG.COL_PUBLISHED_AT]).getHours()]++;
  });

  const ctx = document.getElementById('detail-chart-hourly').getContext('2d');
  if (state.charts.detailHourly) state.charts.detailHourly.destroy();

  state.charts.detailHourly = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: hours.map((_, i) => i % 3 === 0 ? `${i}시` : ''),
      datasets: [{
        data: hours,
        backgroundColor: 'rgba(79,142,247,0.6)',
        borderRadius: 2,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7a869a', font: { size: 9 } }, grid: { display: false } },
        y: { ticks: { color: '#7a869a', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });

  document.getElementById('detail-panel').classList.add('visible');
  document.querySelector('.main').classList.add('detail-open');

  renderAnalysis(journalist, articles);
}

function closeDetail() {
  state.selectedJournalist = null;
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelector('.main').classList.remove('detail-open');
}

// ── Analysis ───────────────────────────────────────────────────────────────

const TOPIC_CATEGORIES = [
  { name: '가상자산·거래소·규제', keywords: ['빗썸','코인원','코빗','업비트','두나무','가상자산','가상화폐','코인','거래소','FIU','과세','크립토','비트코인','이더리움','알트','토큰','디지털자산기본법','가산자산','FIU','코인베이스','바이낸스','리플','솔라나'] },
  { name: 'ETF·자산운용', keywords: ['ETF','상장지수','운용','펀드','투자신탁','TDF','아문디','ACE ETF','자산운용','배당','KODEX','TIGER','나스닥','S&P'] },
  { name: '스테이블코인·디지털금융', keywords: ['스테이블코인','CBDC','USDC','USDT','디페깅','써클','원화코인','페그','디지털달러','디지털금융'] },
  { name: '블록체인·Web3·NFT', keywords: ['블록체인','NFT','DeFi','디파이','레이어','프로토콜','Web3','웹3','DAO','메타버스','P2E','GameFi'] },
  { name: '증권·IPO·M&A', keywords: ['증권','IPO','상장','공모','M&A','인수합병','코스피','코스닥','주가','기업공개','스팩'] },
  { name: '핀테크·결제·은행', keywords: ['핀테크','결제','간편결제','토스','카카오페이','네이버페이','인터넷은행','케이뱅크','카카오뱅크','뱅킹','송금'] },
  { name: '경제·금리·정책', keywords: ['금리','인플레이션','기준금리','한국은행','경제','정책','금융위','금감원','기재부','기획재정부','통화','환율'] },
  { name: '보험·연금', keywords: ['보험','연금','노후','보장','생명보험','손해보험','실손'] },
];

function categorizeArticles(articles) {
  const counts = {};
  TOPIC_CATEGORIES.forEach(c => { counts[c.name] = 0; });
  counts['기타'] = 0;

  articles.forEach(a => {
    const title = (a[CONFIG.COL_TITLE] || '').toLowerCase();
    let matched = false;
    for (const cat of TOPIC_CATEGORIES) {
      if (cat.keywords.some(kw => title.includes(kw.toLowerCase()))) {
        counts[cat.name]++;
        matched = true;
        break;
      }
    }
    if (!matched) counts['기타']++;
  });

  return Object.entries(counts)
    .filter(([, v]) => v > 0)
    .sort((a, b) => b[1] - a[1]);
}

function detectPatterns(articles) {
  const patterns = [];
  const total = articles.length;
  if (total === 0) return patterns;

  // 1. 피크 날짜 감지
  const dayCounts = {};
  articles.forEach(a => {
    const day = a[CONFIG.COL_PUBLISHED_AT].slice(0, 10);
    dayCounts[day] = (dayCounts[day] || 0) + 1;
  });
  const days = Object.values(dayCounts);
  const avg = days.reduce((s, v) => s + v, 0) / days.length;
  const peakDays = Object.entries(dayCounts)
    .filter(([, v]) => v >= Math.max(avg * 2.5, 5))
    .sort((a, b) => b[1] - a[1]);
  if (peakDays.length > 0) {
    const [date, count] = peakDays[0];
    const d = new Date(date);
    patterns.push(`${d.getMonth() + 1}월 ${d.getDate()}일 하루에만 ${count}건이 집중되었습니다.`);
  }

  // 2. 연속 기획 시리즈 감지 (동일 키워드 3건 이상)
  const seriesMap = {};
  const seriesKeywords = ['스테이블코인','비트코인','ETF','과세','거래소','디지털자산','블록체인','규제','CBDC','금리'];
  seriesKeywords.forEach(kw => {
    const matched = articles.filter(a => (a[CONFIG.COL_TITLE] || '').includes(kw));
    if (matched.length >= 3) {
      const dates = matched.map(a => a[CONFIG.COL_PUBLISHED_AT].slice(0, 10)).sort();
      seriesMap[kw] = { count: matched.length, dates };
    }
  });
  const seriesList = Object.entries(seriesMap).sort((a, b) => b[1].count - a[1].count);
  if (seriesList.length > 0) {
    const [kw, info] = seriesList[0];
    const first = new Date(info.dates[0]);
    const last = new Date(info.dates[info.dates.length - 1]);
    patterns.push(`'${kw}' 관련 기사를 ${info.count}건 연속 추적 취재했습니다 (${first.getMonth()+1}/${first.getDate()} ~ ${last.getMonth()+1}/${last.getDate()}).`);
  }

  // 3. 크로스오버 취재 여부
  const hasTradi = articles.some(a => {
    const t = a[CONFIG.COL_TITLE] || '';
    return ['ETF','증권','펀드','주가','코스피'].some(kw => t.includes(kw));
  });
  const hasCrypto = articles.some(a => {
    const t = a[CONFIG.COL_TITLE] || '';
    return ['가상자산','코인','블록체인','비트코인','거래소'].some(kw => t.includes(kw));
  });
  if (hasTradi && hasCrypto) {
    patterns.push('가상자산과 전통 금융(ETF·증권) 양쪽을 모두 커버하는 크로스오버 취재 패턴이 나타납니다.');
  }

  return patterns;
}

function buildSummary(journalist, articles, categories) {
  const name = journalist?.name || '이 기자';
  const outlet = journalist?.outlet || '';
  const total = articles.length;
  const days = state.filterDays;

  const toDate = new Date();
  const fromDate = new Date();
  fromDate.setDate(fromDate.getDate() - days);
  const period = `${fromDate.getMonth()+1}월 ${fromDate.getDate()}일~${toDate.getMonth()+1}월 ${toDate.getDate()}일`;

  const top = categories[0];
  const topPct = top ? Math.round(top[1] / total * 100) : 0;

  let summary = `${outlet} ${name} 기자의 최근 ${days}일(${period}) 기사 ${total}건을 분석한 결과입니다.`;
  if (top && topPct >= 20) {
    summary += ` 전체 기사의 ${topPct}%가 <strong>${top[0]}</strong> 분야에 집중되어 있습니다.`;
  }
  return summary;
}

function renderAnalysis(journalist, articles) {
  const card = document.getElementById('analysis-card');
  if (articles.length === 0) { card.style.display = 'none'; return; }

  const categories = categorizeArticles(articles);
  const patterns = detectPatterns(articles);
  const total = articles.length;

  document.getElementById('analysis-summary').innerHTML = buildSummary(journalist, articles, categories);

  const catEl = document.getElementById('analysis-categories');
  catEl.innerHTML = categories.slice(0, 5).map(([name, count]) => {
    const pct = Math.round(count / total * 100);
    return `<div class="category-row">
      <div class="bar-bg" style="width:4px;height:28px;border-radius:2px;flex-shrink:0">
        <div class="bar-fill" style="width:100%;height:${pct}%;background:var(--accent);border-radius:2px;position:relative;top:${100-pct}%"></div>
      </div>
      <span class="category-name">${name}</span>
      <span class="category-count">${count}건</span>
      <span class="category-pct">${pct}%</span>
    </div>`;
  }).join('');

  const patternsBlock = document.getElementById('analysis-patterns-block');
  const patternsEl = document.getElementById('analysis-patterns');
  if (patterns.length > 0) {
    patternsEl.innerHTML = patterns.map(p =>
      `<div class="pattern-item"><span class="pattern-dot">▪</span><span>${p}</span></div>`
    ).join('');
    patternsBlock.style.display = 'block';
  } else {
    patternsBlock.style.display = 'none';
  }

  card.style.display = 'block';
}
